<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Gaze-scroll score reader</title>
<style>
  html, body { margin: 0; height: 100%; }
  #app { height: 100%; }
  /* Reader: a fixed toolbar above a single scrollable page strip. */
  .reader { display: flex; flex-direction: column; height: 100%; }
  .toolbar { display: flex; gap: .5rem; padding: .5rem; background: #222; color: #fff; }
  .scroller { flex: 1; overflow-y: auto; overflow-x: hidden; background: #444; }
  .strip { width: 100%; }
  /* Pages scale to the strip width (responsive width set inline); never clipped. */
  .page { display: block; }
  .error { color: #b00; padding: 1rem; }
</style>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/web/js/main.js"></script>
</body>
</html>
